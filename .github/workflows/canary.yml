name: Canary Release

on:
  push:
    branches: [main]

concurrency:
  group: canary-release
  cancel-in-progress: true

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set canary version
        working-directory: packages/futonic
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CANARY_VERSION="0.0.0-canary.${SHA}"
          bun -e "
            const pkg = await Bun.file('package.json').json();
            pkg.version = '${CANARY_VERSION}';
            await Bun.write('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Published version: ${CANARY_VERSION}"

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish canary
        working-directory: packages/futonic
        run: npm publish --tag canary --provenance --access public
